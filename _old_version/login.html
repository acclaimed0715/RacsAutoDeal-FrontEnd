<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Racs Auto Deal</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-layout">
        <!-- Left Side: Login Form -->
        <div class="login-form-side">
            <div class="login-header">
                <img src="assets/logo.png" alt="Racs Auto Deal Logo" class="login-logo">
            </div>
            
            <div class="form-container">
                <h1>Sign in</h1>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="username" placeholder="Enter your username" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your Password" required>
                            <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">Login</button>
                    
                    <div class="login-footer">
                        <p id="errorMsg" class="error-msg"></p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Right Side: Image Overlay -->
        <div class="login-image-side">
            <div class="image-overlay">
                <div class="image-text">
                    <h2>Racs Auto Deal Admin</h2>
                    <p>Log in to access</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
